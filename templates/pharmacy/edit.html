{% extends "layout.html" %}
{% block title %}Edit Pharmacy #{{ post.mid }} — {{ app_name }}{% endblock %}
{% block body %}
<div class="page-hero">
  <div class="container">
    <div class="page-hero-badge"><i class="fas fa-edit"></i> Edit Record</div>
    <h1><i class="fas fa-edit me-3"></i>Edit Pharmacy — #{{ post.mid }}</h1>
    <p>Updating details for <strong>{{ post.medical_name }}</strong>.</p>
  </div>
</div>
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card p-4">
        <form action="/edit/{{ post.mid }}" method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Pharmacy ID</label>
            <input type="text" class="form-control" value="{{ post.mid }}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label">Pharmacy Name</label>
            <input type="text" name="medical_name" class="form-control" value="{{ post.medical_name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Owner Name</label>
            <input type="text" name="owner_name" class="form-control" value="{{ post.owner_name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone_no" class="form-control" value="{{ post.phone_no }}" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2" required>{{ post.address }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="fas fa-save me-2"></i>Save Changes
            </button>
            <a href="/dashboard" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
