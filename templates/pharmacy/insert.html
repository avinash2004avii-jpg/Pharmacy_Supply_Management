{% extends "layout.html" %}
{% block title %}Register Pharmacy — {{ app_name }}{% endblock %}
{% block body %}
<div class="page-hero">
  <div class="container">
    <div class="page-hero-badge"><i class="fas fa-plus-circle"></i> New Record</div>
    <h1><i class="fas fa-plus-circle me-3"></i>Register Pharmacy</h1>
    <p>Add a new pharmacy store to the supply management system.</p>
  </div>
</div>
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card p-4">
        <form action="/insert" method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Pharmacy ID <span class="text-muted small">(unique number)</span></label>
            <input type="number" name="mid" class="form-control" placeholder="e.g. 104" required min="1">
          </div>
          <div class="mb-3">
            <label class="form-label">Pharmacy Name</label>
            <input type="text" name="medical_name" class="form-control" placeholder="e.g. HealthFirst Medical Store" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Owner Name</label>
            <input type="text" name="owner_name" class="form-control" placeholder="Owner's full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone_no" class="form-control" placeholder="e.g. 9876543210" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2" placeholder="Full address including city" required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="fas fa-save me-2"></i>Register Pharmacy
            </button>
            <a href="/dashboard" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
