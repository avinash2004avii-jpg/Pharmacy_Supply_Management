{% extends "layout.html" %}
{% block title %}Customer Login — {{ app_name }}{% endblock %}
{% block body %}
<div class="page-hero">
  <div class="container">
    <div class="page-hero-badge"><i class="fas fa-user"></i> Customer Portal</div>
    <h1><i class="fas fa-user me-3"></i>Customer Login</h1>
    <p>Login to browse the catalog, place orders, and track your deliveries.</p>
  </div>
</div>
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card p-4">
        <form action="/customer/login" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
        <div class="text-center mt-3">
          <span class="text-muted small">New customer? </span>
          <a href="/customer/register" class="small">Create account</a>
        </div>
        <div class="text-center mt-2">
          <a href="/" class="small text-muted"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
