<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — {{ app_name }}</title>
  <link href="{{ url_for('static', filename='css/fallback-ui.css') }}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="login-card">
          <div class="text-center mb-4">
            <div class="login-brand-icon">
              <i class="fas fa-clinic-medical" style="color:#fff;"></i>
            </div>
            <h4 class="fw-bold mb-1" style="font-family:'Sora',sans-serif;">Admin Login</h4>
            <p class="text-muted small mb-0">{{ app_name }}</p>
          </div>

          <form action="/login" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="uname" class="form-control" placeholder="Admin username" required autofocus autocomplete="off">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Admin password" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In to Admin
            </button>
          </form>

          <div class="divider"></div>
          <div class="text-center">
            <a href="/customer/login" class="small text-muted me-3"><i class="fas fa-user me-1"></i>Customer Login</a>
            <a href="/" class="small text-muted"><i class="fas fa-home me-1"></i>Home</a>
          </div>
        </div>

        <p class="text-center mt-3" style="color:var(--text-muted);font-size:0.8rem;">
          &copy; 2026 Avinash &middot; Pharmacy Supply Management
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
