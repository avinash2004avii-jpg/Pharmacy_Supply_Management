{% extends "layout.html" %}
{% block title %}Customer Register — {{ app_name }}{% endblock %}
{% block body %}
<div class="page-hero">
  <div class="container">
    <div class="page-hero-badge"><i class="fas fa-user-plus"></i> New Account</div>
    <h1><i class="fas fa-user-plus me-3"></i>Customer Registration</h1>
    <p>Create your account to browse our medicine catalog and place orders.</p>
  </div>
</div>
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card p-4">
        <form action="/customer/register" method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="full_name" class="form-control" placeholder="Your full name" required minlength="2">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Password <span class="text-muted small">(min 6 characters)</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Create a password" required minlength="6">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-user-check me-2"></i>Create Account
          </button>
        </form>
        <div class="text-center mt-3">
          <span class="text-muted small">Already have an account? </span>
          <a href="/customer/login" class="small">Login here</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
