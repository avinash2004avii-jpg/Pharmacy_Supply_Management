{% extends "layout.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block body %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:60px 16px;">
  <div class="text-center">
    <div style="font-size:6rem;font-weight:800;font-family:'Sora',sans-serif;background:linear-gradient(135deg,#ef4444,#b91c1c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">500</div>
    <h2 class="fw-bold mt-3 mb-2">Internal Server Error</h2>
    <p class="text-muted mb-4">Something went wrong on our end. Please try again in a moment.</p>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <a href="/" class="btn btn-primary px-4"><i class="fas fa-home me-2"></i>Go Home</a>
      <a href="/login" class="btn btn-outline-secondary px-4"><i class="fas fa-sign-in-alt me-2"></i>Login Again</a>
    </div>
  </div>
</div>
{% endblock %}
