{% extends "layout.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block body %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:60px 16px;">
  <div class="text-center">
    <div style="font-size:6rem;font-weight:800;font-family:'Sora',sans-serif;background:linear-gradient(135deg,#3b82f6,#1a4a8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">404</div>
    <h2 class="fw-bold mt-3 mb-2">Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <a href="/" class="btn btn-primary px-4"><i class="fas fa-home me-2"></i>Go Home</a>
      <a href="/dashboard" class="btn btn-outline-secondary px-4"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
